name: Benchmarks

# Trigger policy
# ─────────────────────────────────────────────────────────────────────────────
# push (main, relevant paths)
#   Run the full @bench.T suite to catch correctness regressions whenever
#   interpreter, lexer, parser, or bench code lands on main.
#
# schedule — Sundays 02:00 UTC
#   Weekly timing snapshot: run the CLI runner with --all --csv, upload the
#   CSV as a dated artifact, post human-readable results to the job summary,
#   and publish historical benchmark data.
#
# workflow_dispatch
#   On-demand: same as the scheduled run. Useful before/after a refactor or
#   when investigating a suspected regression.
#
# pull_request (same-repository branches only for comment/history steps)
#   Run the benchmark suite, measure base and head CSV snapshots on the same
#   runner, and post reporting-only benchmark comments/summaries without
#   updating the historical gh-pages baseline.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "interpreter/**"
      - "lexer/**"
      - "parser/**"
      - "compiler/**"
      - "ast/**"
  pull_request:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "interpreter/**"
      - "lexer/**"
      - "parser/**"
      - "compiler/**"
      - "ast/**"
      - ".github/workflows/bench.yml"
      - "scripts/render-benchmark-summary.py"
  schedule:
    - cron: "0 2 * * 0" # every Sunday at 02:00 UTC
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod.json') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Update registry
        run: moon update

      # ── Primary surface ────────────────────────────────────────────────────
      # Runs all @bench.T test blocks (benchmarks.mbt).  Each block verifies
      # expected output via expect() before the timed b.bench() loop, so a
      # wrong result aborts with a clear diagnostic rather than producing fast-
      # but-wrong timings.  Covers: lexer/small, lexer/large, exec/*, pipeline/*.
      - name: Run @bench.T suite
        run: moon test benchmarks/ --target js

      # ── CSV baseline snapshot / PR report source ──────────────────────────
      # The CLI runner (benchmarks/main.mbt) measures the same workloads with fixed
      # iteration counts and emits machine-readable CSV rows.  Scheduled/manual
      # runs update long-term history; same-repository PRs measure base and head
      # in the same read-only CI job for reporting-only comments without updating
      # the baseline.
      - name: Generate CSV baseline
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          set -o pipefail
          moon run benchmarks --target js -- --all --csv | tee bench-results.csv

      - name: Generate PR base/head CSV baselines
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          result_dir="$RUNNER_TEMP/bench-pr-results"
          mkdir -p "$result_dir"
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          git checkout --force "$BASE_SHA"
          moon update
          moon run benchmarks --target js -- --all --csv | tee "$result_dir/bench-base-results.csv"
          git checkout --force "$HEAD_SHA"
          moon update
          moon run benchmarks --target js -- --all --csv | tee "$result_dir/bench-head-results.csv"
          # Restore the workflow checkout before rendering, so old PR branches
          # still use the renderer from the tested merge ref.
          git checkout --force "$GITHUB_SHA"
          cp "$result_dir/bench-base-results.csv" bench-base-results.csv
          cp "$result_dir/bench-head-results.csv" bench-head-results.csv
          cp "$result_dir/bench-head-results.csv" bench-results.csv

      - name: Upload CSV artifact
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-results-${{ github.sha }}
          path: bench-results.csv
          retention-days: 90

      - name: Upload PR base CSV artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-base-results-${{ github.event.pull_request.base.sha }}
          path: bench-base-results.csv
          retention-days: 90

      - name: Upload PR head CSV artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-head-results-${{ github.event.pull_request.head.sha }}
          path: bench-head-results.csv
          retention-days: 90

      # ── Job summary ────────────────────────────────────────────────────────
      # Scheduled/manual/same-repository PR reporting writes a human-readable
      # summary without needing repository-write credentials.
      - name: Post human-readable results to summary
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) && !cancelled()
        env:
          MOONBIT_VERSION: ${{ steps.moonbit-version.outputs.version }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          base_args=()
          if [ -f bench-base-results.csv ]; then
            base_args=(--base-csv bench-base-results.csv)
          fi
          python3 scripts/render-benchmark-summary.py bench-results.csv \
            "${base_args[@]}" \
            --format github-summary \
            --commit "$REPORT_SHA" \
            --runner-name "$RUNNER_NAME" \
            --runner-os "$RUNNER_OS" \
            --trigger "$GITHUB_EVENT_NAME" \
            --moonbit-version "$MOONBIT_VERSION" \
            --artifact-name "bench-results-$GITHUB_SHA" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Render benchmark PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/render-benchmark-summary.py bench-results.csv \
            --base-csv bench-base-results.csv \
            --format pr-comment \
            --run-url "$RUN_URL" \
            > benchmark-pr-comment.md

      - name: Upload rendered PR comment artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-pr-comment-${{ github.sha }}
          path: benchmark-pr-comment.md
          retention-days: 90

  publish-benchmark-report:
    needs: bench
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download CSV artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: bench-results-${{ github.sha }}
          path: .

      - name: Download rendered PR comment artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: benchmark-pr-comment-${{ github.sha }}
          path: .

      # ── Historical benchmark dashboard / PR comments ───────────────────────
      # Scheduled / manual runs publish a GitHub Pages benchmark history through
      # benchmark-action/github-action-benchmark.  Same-repository PRs get a
      # reporting-only benchmark comment and job summary, but do not save data or
      # push to gh-pages.  Fork PRs are skipped for token/write-safety.
      - name: Convert CSV for benchmark-action
        run: |
          python3 - <<'PY'
          import csv
          import json

          rows = []
          with open("bench-results.csv", newline="") as f:
              for r in csv.DictReader(f):
                  rows.append({
                      "name": f"{r['stage']}/{r['name']}",
                      "unit": "ms",
                      "value": float(r["mean_ms"]),
                      "extra": f"category={r['category']}, cv={float(r['cv_pct']):.1f}%, noisy={r['noisy']}",
                  })

          with open("benchmark-action-results.json", "w") as f:
              json.dump(rows, f, indent=2)
          PY

      - name: Publish benchmark history
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark-action-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks
          summary-always: true

      - name: Compare benchmark history for PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark-action-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          save-data-file: false
          summary-always: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Comment benchmark summary on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          marker = "<!-- js-engine-benchmark-report -->"
          body = Path("benchmark-pr-comment.md").read_text()
          if marker not in body:
              raise SystemExit("benchmark PR comment body is missing the marker")

          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          base_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          existing = None
          page = 1
          while True:
              page_url = f"{base_url}?per_page=100&page={page}"
              req = urllib.request.Request(page_url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  comments = json.load(response)
              existing = next((c for c in comments if marker in c.get("body", "")), None)
              if existing or len(comments) < 100:
                  break
              page += 1

          payload = json.dumps({"body": body}).encode()
          if existing:
              req = urllib.request.Request(existing["url"], data=payload, headers=headers, method="PATCH")
          else:
              req = urllib.request.Request(base_url, data=payload, headers=headers, method="POST")
          with urllib.request.urlopen(req) as response:
              response.read()
          PY
