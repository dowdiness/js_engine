name: "Test262 Conformance"

on:
  push:
    branches: [main]
    paths-ignore:
      # Docs and markdown never affect the engine or the runner.
      - 'docs/**'
      - '*.md'
      # NOTE: scripts/** is intentionally NOT ignored because the authoritative
      # native MoonBit tooling reads shared data under scripts/ (e.g.
      # test262_skip_metadata.json), so changes there must re-trigger CI.
      - '.gitignore'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      # Skip on changes to OTHER workflow files (actionlint.yml, bench.yml,
      # copilot-setup-steps.yml). The negation re-includes this workflow's
      # own file so editing test262.yml still re-runs it. Order matters:
      # the ignore must precede the negation.
      - '.github/workflows/**'
      - '!.github/workflows/test262.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'
      - '!.github/workflows/test262.yml'
  workflow_dispatch:

# Auto-cancel superseded PR runs (you only care about the latest commit's
# verification on a PR), but never cancel in-progress runs on main — each
# merge must verify its own commit independently. The expression evaluates
# per-event, so the same group key serves both push-to-main and PR-update.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TEST262_COMMIT: "2b2ecead6e82"
  # Bump this string to force a toolchain cache bust (e.g. after a MoonBit release).
  MOONBIT_CACHE_VERSION: "2026-06"
  SHARD_TOTAL: 4

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache MoonBit toolchain
        id: toolchain-cache
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-toolchain-${{ runner.os }}-${{ env.MOONBIT_CACHE_VERSION }}

      - name: Install MoonBit toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Architecture state audit
        run: make architecture-state-audit

      - name: Test262 metadata parity
        run: make test262-metadata-test

      - name: Test262 utils parity
        run: make test262-utils-test

      - name: Check and test
        run: |
          moon check
          moon test

  unit-test-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-unit-runner-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-unit-runner-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Cache test262 suite (read-only)
        # Read-only restore: unit-test-runner is not the authoritative writer for
        # the test262 suite cache — the test262 matrix jobs own that. Using
        # cache/restore avoids concurrent-write races on the shared key.
        uses: actions/cache/restore@v5
        with:
          path: test262
          key: test262-${{ env.TEST262_COMMIT }}

      - name: Test262 runner shadow unit parity
        # make test262-runner-test includes a test262-download guard that skips
        # if test262/test already exists (from the cache restore above).
        run: make test262-runner-test

  test262:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mode: [strict, non-strict]
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache MoonBit toolchain
        id: toolchain-cache
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-toolchain-${{ runner.os }}-${{ env.MOONBIT_CACHE_VERSION }}

      - name: Install MoonBit toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-test262-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-test262-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Build JS engine
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: moon build --target js --release

      - name: Cache test262 suite
        uses: actions/cache@v5
        with:
          path: test262
          key: test262-${{ env.TEST262_COMMIT }}

      - name: Download Test262
        run: |
          if [ ! -d "test262/test" ]; then
            curl -fsSL -L "https://api.github.com/repos/tc39/test262/tarball/${{ env.TEST262_COMMIT }}" -o /tmp/test262.tar.gz
            mkdir -p test262
            tar -xzf /tmp/test262.tar.gz -C test262 --strip-components=1
          fi

      - name: Build native tools
        run: moon build --target native cmd/test262_runner

      - name: Run Test262 (${{ matrix.mode }}, shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }})
        # MoonBit cmd/test262_runner is authoritative (issue #255 promotion).
        # The runner exits 0 whenever it completes and writes results JSON —
        # conformance failures are data, judged by regression-check. A
        # non-zero status here is a real runner/infra failure and fails the
        # job (artifact upload still runs via `if: always()`).
        shell: bash
        run: |
          set +e
          ./_build/native/debug/build/cmd/test262_runner/test262_runner.exe \
            --test262 ./test262 \
            --mode ${{ matrix.mode }} \
            --shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }} \
            --threads 4 \
            --timeout 5 \
            --output test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json \
            --summary
          rc=$?
          # Keep this job's summary page minimal; the regression-check job
          # owns the aggregate verdict and all detail tables.
          {
            echo "## Test262 shard collected"
            echo
            echo "Mode: ${{ matrix.mode }} — Shard: ${{ matrix.shard }}/${{ env.SHARD_TOTAL }} — runner exit: $rc"
            echo
            echo "See the \`regression-check\` summary for the aggregate verdict."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" -ne 0 ]; then
            echo "::error title=Test262 runner failed::runner exited $rc without usable results JSON (mode ${{ matrix.mode }}, shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }})" >&2
          fi
          exit "$rc"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results
          path: test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json
          if-no-files-found: warn
          retention-days: 90

  regression-check:
    needs: test262
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read

    steps:
      # Full checkout (not sparse): the per-edition aggregate runs
      # cmd/classify_by_edition here, once, against the merged canonical
      # results — that needs the MoonBit sources and the test262 checkout.
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          pattern: test262-*-results
          merge-multiple: true

      - name: Cache MoonBit toolchain
        id: toolchain-cache
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-toolchain-${{ runner.os }}-${{ env.MOONBIT_CACHE_VERSION }}

      - name: Install MoonBit toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-regression-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-regression-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Build edition classifier
        run: moon build --target native cmd/classify_by_edition

      - name: Cache test262 suite (read-only)
        # Read-only restore: the test262 matrix jobs own this cache key;
        # cache/restore avoids concurrent-write races on the shared key.
        uses: actions/cache/restore@v5
        with:
          path: test262
          key: test262-${{ env.TEST262_COMMIT }}

      - name: Download Test262 if needed
        run: |
          if [ ! -d "test262/test" ]; then
            curl -fsSL -L "https://api.github.com/repos/tc39/test262/tarball/${{ env.TEST262_COMMIT }}" -o /tmp/test262.tar.gz
            mkdir -p test262
            tar -xzf /tmp/test262.tar.gz -C test262 --strip-components=1
          fi

      - name: Check for regressions
        run: |
          python3 << 'PYEOF'
          import glob, json, os, re, subprocess, sys

          SHARD_TOTAL = ${{ env.SHARD_TOTAL }}
          MODE_ORDER = ["strict", "non-strict"]

          def empty_breakdown_counts():
              return {
                  "total": 0,
                  "passed": 0,
                  "failed": 0,
                  "skipped": 0,
                  "timeouts": 0,
                  "errors": 0,
              }

          def add_breakdown_counts(dst, src):
              # Category objects in the current runner schema guarantee
              # total/passed/failed/skipped/pass_rate. timeout/error may be absent.
              dst["total"] += int(src.get("total", 0))
              dst["passed"] += int(src.get("passed", 0))
              dst["failed"] += int(src.get("failed", 0))
              dst["skipped"] += int(src.get("skipped", 0))
              dst["timeouts"] += int(src.get("timeouts", src.get("timeout", 0)))
              dst["errors"] += int(src.get("errors", src.get("error", 0)))

          def finalize_breakdown_counts(counts):
              total = int(counts["total"])
              skipped = int(counts["skipped"])
              # For category data, the most stable denominator is total - skipped.
              # This avoids depending on whether timeout/error are broken out in
              # category-level objects.
              executed = max(0, total - skipped)
              rate = counts["passed"] / executed * 100 if executed > 0 else 0.0
              discovered_rate = counts["passed"] / total * 100 if total > 0 else 0.0
              return {
                  "total": total,
                  "executed": executed,
                  "passed": int(counts["passed"]),
                  "failed": int(counts["failed"]),
                  "skipped": skipped,
                  "timeouts": int(counts["timeouts"]),
                  "errors": int(counts["errors"]),
                  "rate": float(rate),
                  "discovered_rate": float(discovered_rate),
              }

          # Load baseline
          with open("test262-baseline.json") as f:
              baseline = json.load(f)

          total_passed = 0
          total_failed = 0
          total_skipped = 0
          total_timeouts = 0
          missing = []
          regressions = []
          rows = []        # (mode, p, fa, to, rate, mode_min, delta) — per mode
          shard_rows = []  # (mode, idx, total, passed, failed, timeouts, rate) — per shard
          mode_shards = {}  # mode -> [parsed shard json, ...] for complete sets
          category_acc = {mode: {} for mode in MODE_ORDER}

          for mode in ["non-strict", "strict"]:
              shard_files = sorted(glob.glob(f"test262-{mode}-shard-*of{SHARD_TOTAL}-results.json"))
              if not shard_files:
                  print(f"{mode}: MISSING (no shard result files found)")
                  missing.append(mode)
                  continue
              if len(shard_files) != SHARD_TOTAL:
                  print(f"{mode}: INCOMPLETE ({len(shard_files)}/{SHARD_TOTAL} shards found)")
                  missing.append(mode)
                  continue
              p, fa, sk, to = 0, 0, 0, 0
              mode_shards[mode] = []
              for sf in shard_files:
                  with open(sf) as fh:
                      data = json.load(fh)
                  mode_shards[mode].append(data)
                  for category, counts in data.get("categories", {}).items():
                      acc = category_acc[mode].setdefault(category, empty_breakdown_counts())
                      add_breakdown_counts(acc, counts)
                  s = data["summary"]
                  s_pass = s["passed"]
                  s_fail = s["failed"]
                  s_skip = s.get("skipped", 0)
                  s_time = s.get("timeout", 0)
                  p += s_pass; fa += s_fail; sk += s_skip; to += s_time
                  s_ex = s_pass + s_fail
                  s_rate = s_pass / s_ex * 100 if s_ex > 0 else 0
                  sh_m = re.search(r"-shard-(\d+)of(\d+)-", sf)
                  shard_rows.append((
                      mode,
                      int(sh_m.group(1)) if sh_m else 0,
                      int(sh_m.group(2)) if sh_m else 0,
                      s_pass, s_fail, s_time, s_rate,
                  ))
              total_passed += p
              total_failed += fa
              total_skipped += sk
              total_timeouts += to
              executed = p + fa
              rate = (p / executed * 100) if executed > 0 else 0

              # Per-mode baseline check
              mode_min = baseline.get(mode, {}).get("passed_min", 0)
              delta = p - mode_min
              sign = "+" if delta >= 0 else ""
              status = "OK" if p >= mode_min else "REGRESSION"
              print(f"{mode:>12}: {rate:5.1f}%  ({p} passed, {fa} failed, {to} timeouts)  [{status}: {sign}{delta} vs {mode_min} min]")

              if p < mode_min:
                  regressions.append(f"{mode}: {p} passed < {mode_min} baseline ({mode_min - p} regressed)")
              rows.append((mode, p, fa, to, rate, mode_min, delta))

          # Combined
          combined_min = baseline.get("combined", {}).get("passed_min", 0)
          combined_exec = total_passed + total_failed
          combined_rate = (total_passed / combined_exec * 100) if combined_exec > 0 else 0
          combined_delta = total_passed - combined_min
          if combined_exec > 0:
              sign = "+" if combined_delta >= 0 else ""
              print()
              print(f"    combined: {combined_rate:5.1f}%  ({total_passed} passed, {total_failed} failed)  [{sign}{combined_delta} vs {combined_min} min]")

          # The combined baseline only means something when every mode is
          # complete — with a shard missing, a low combined total is an
          # artifact of the gap, not a regression.
          if not missing and total_passed < combined_min:
              regressions.append(f"combined: {total_passed} passed < {combined_min} baseline")

          # Merge each complete shard set into the canonical per-mode results
          # file (pre-sharding name; `make test262-report` finds these first).
          # Same shape as merge_shards_to_file in tooling/subprocess_helpers:
          # summed summary, concatenated results.
          for mode, shards in mode_shards.items():
              merged_summary = {k: 0 for k in ["total", "passed", "failed", "skipped", "timeout", "error"]}
              merged_results = []
              for data in shards:
                  for k in merged_summary:
                      merged_summary[k] += data["summary"].get(k, 0)
                  merged_results.extend(data.get("results", []))
              merged = {
                  "engine": shards[0].get("engine", "MoonBit JS Engine"),
                  "date": shards[0].get("date", "1970-01-01T00:00:00Z"),
                  "summary": merged_summary,
                  "categories": {},
                  "results": merged_results,
              }
              with open(f"test262-{mode}-results.json", "w") as f:
                  json.dump(merged, f, indent=2)

          # Compact known-failures list for future diff reporting.
          # Only written when all shards are present — partial data would produce
          # a misleading "recovered" signal on the next run that downloads it.
          if not missing:
              kf = []
              for mode in MODE_ORDER:
                  rp = f"test262-{mode}-results.json"
                  if os.path.exists(rp):
                      with open(rp) as fh:
                          data = json.load(fh)
                      for r in data.get("results", []):
                          if r.get("status") not in ("pass", "skip"):
                              kf.append({"path": r["path"], "mode": mode})
              kf.sort(key=lambda r: (r["path"], r["mode"]))
              with open("test262-known-failures.json", "w") as f:
                  json.dump(kf, f)
                  f.write("\n")

          # Per-category aggregate (summed counts, rates recomputed — never
          # average shard pass rates).
          categories_payload = {
              mode: {
                  category: finalize_breakdown_counts(counts)
                  for category, counts in sorted(category_acc.get(mode, {}).items())
              }
              for mode in MODE_ORDER
          }

          # Per-edition aggregate: run classify_by_edition once against the
          # merged canonical files. Edition mapping needs test metadata, so
          # this stays in the classifier rather than being re-derived here.
          edition_md = ""
          edition_report_error = None
          editions_payload = {}
          edition_paths = [
              p for p in ["test262-strict-results.json", "test262-non-strict-results.json"]
              if os.path.exists(p)
          ]
          classifier = "./_build/native/debug/build/cmd/classify_by_edition/classify_by_edition.exe"
          if edition_paths and os.path.exists(classifier) and os.path.isdir("test262/test"):
              completed = subprocess.run(
                  [classifier, "--markdown", "--test262-root", "./test262",
                   "--json-output", "test262-editions.json", *edition_paths],
                  text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
              )
              if completed.returncode == 0:
                  edition_md = completed.stdout.strip()
                  with open("test262-editions.md", "w") as f:
                      f.write(edition_md)
                      f.write("\n")
                  with open("test262-editions.json") as f:
                      editions_payload = json.load(f).get("editions", {})
              else:
                  edition_report_error = completed.stderr.strip() or f"classify_by_edition exited {completed.returncode}"
          else:
              edition_report_error = "edition classifier unavailable; skipped per-edition aggregate"
          if edition_report_error:
              print(f"::warning title=Test262 report incomplete::{edition_report_error}")

          # Build the summary markdown once; it feeds both the step summary
          # and the test262-summary.md artifact.
          # INCOMPLETE dominates REGRESSION: a regression verdict is only
          # trustworthy when computed from a complete shard set.
          badge = "⚠️" if missing else ("🔴" if regressions else "🟢")
          verdict = "INCOMPLETE" if missing else ("REGRESSION" if regressions else "PASS")
          verdict_label = {"PASS": "All baselines met", "REGRESSION": "REGRESSION", "INCOMPLETE": "INCOMPLETE"}[verdict]
          lines = []
          lines.append(f"## Test262 Conformance {badge} {verdict_label}\n")
          if rows:
              lines.append("| Mode | Passed | Failed | Timeouts | P/E | Baseline | Delta |")
              lines.append("|---|---:|---:|---:|---:|---:|---:|")
              for (m, p, fa, to, rate, mode_min, delta) in rows:
                  dsign = "+" if delta >= 0 else ""
                  lines.append(f"| {m} | {p:,} | {fa:,} | {to:,} | **{rate:.1f}%** | {mode_min:,} | {dsign}{delta:,} |")
              if combined_exec > 0:
                  csign = "+" if combined_delta >= 0 else ""
                  lines.append(f"| **combined** | **{total_passed:,}** | **{total_failed:,}** | **{total_timeouts:,}** | **{combined_rate:.1f}%** | {combined_min:,} | {csign}{combined_delta:,} |")
          if missing:
              lines.append("\n### Missing modes\n")
              for m in missing:
                  lines.append(f"- {m}: shard results missing or incomplete")
          if regressions:
              lines.append("\n### Regressions\n")
              for r in regressions:
                  lines.append(f"- {r}")

          def format_breakdown_cell(stats):
              if not stats:
                  return "—"
              pe = "—" if stats["executed"] == 0 else f"{stats['rate']:.1f}%"
              pd = "—" if stats["total"] == 0 else f"{stats['discovered_rate']:.1f}%"
              return f"{stats['passed']:,}/{stats['failed']:,}/{stats['skipped']:,} ({pe}, {pd})"

          all_categories = sorted(
              {c for by_mode in categories_payload.values() for c in by_mode},
              key=lambda c: (
                  -max(categories_payload.get(m, {}).get(c, {}).get("failed", 0) for m in MODE_ORDER),
                  c,
              ),
          )
          if all_categories:
              TOP_CATEGORIES = 25
              def category_table(categories):
                  out = ["| Category | strict | non-strict |", "|---|---:|---:|"]
                  for c in categories:
                      out.append("| {c} | {s} | {n} |".format(
                          c=c,
                          s=format_breakdown_cell(categories_payload.get("strict", {}).get(c)),
                          n=format_breakdown_cell(categories_payload.get("non-strict", {}).get(c)),
                      ))
                  return out
              lines.append("\n### Per-category breakdown (top %d by failures)\n" % min(TOP_CATEGORIES, len(all_categories)))
              lines.append("Each cell is `passed/failed/skipped (Passed / Executed, Passed / Discovered)`.\n")
              lines.extend(category_table(all_categories[:TOP_CATEGORIES]))
              if len(all_categories) > TOP_CATEGORIES:
                  lines.append("\n<details>")
                  lines.append("<summary>All %d categories</summary>\n" % len(all_categories))
                  lines.extend(category_table(all_categories))
                  lines.append("\n</details>")

          if edition_md:
              lines.append("\n### Per-edition breakdown\n")
              lines.append(edition_md)
          elif edition_report_error:
              lines.append("\n### Per-edition breakdown\n")
              lines.append(f"Skipped: {edition_report_error}")

          if shard_rows:
              lines.append("\n### Per-shard breakdown\n")
              lines.append("| Mode | Shard | Passed | Failed | Timeouts | P/E |")
              lines.append("|---|---|---:|---:|---:|---:|")
              for (m, sidx, stot, s_p, s_f, s_t, s_r) in shard_rows:
                  lines.append(f"| {m} | {sidx}/{stot} | {s_p:,} | {s_f:,} | {s_t:,} | {s_r:.1f}% |")
          md = "\n".join(lines) + "\n"

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write(md)
          with open("test262-summary.md", "w") as f:
              f.write(md)

          # Machine-readable summary for dashboards and report tooling.
          #
          # Schema notes:
          # - `verdict` is the top-level decision: PASS / REGRESSION / INCOMPLETE.
          # - `rate` is a numeric percentage, not a formatted string.
          # - `baseline` is the minimum expected passed count for that scope.
          # - `delta` is passed - baseline.
          # - Missing modes are reported in `missing`; they are not synthesized as
          #   zero-valued mode entries because that would blur "not measured" vs "0 pass".
          modes_payload = {}
          for (mode, passed, failed_count, timeouts, rate, baseline_min, delta) in rows:
              modes_payload[mode] = {
                  "passed": int(passed),
                  "failed": int(failed_count),
                  "timeouts": int(timeouts),
                  "executed": int(passed + failed_count),
                  "rate": float(rate),
                  "baseline": int(baseline_min),
                  "delta": int(delta),
              }

          shards_payload = []
          for (mode, shard_index, shard_total, passed, failed_count, timeouts, rate) in shard_rows:
              shards_payload.append({
                  "mode": mode,
                  "shard_index": int(shard_index),
                  "shard_total": int(shard_total),
                  "passed": int(passed),
                  "failed": int(failed_count),
                  "timeouts": int(timeouts),
                  "executed": int(passed + failed_count),
                  "rate": float(rate),
              })

          summary_payload = {
              "schema_version": 1,
              "verdict": verdict,
              "shard_total": int(SHARD_TOTAL),
              "combined": {
                  "passed": int(total_passed),
                  "failed": int(total_failed),
                  "timeouts": int(total_timeouts),
                  "executed": int(total_passed + total_failed),
                  "rate": float(combined_rate),
                  "baseline": int(combined_min),
                  "delta": int(combined_delta),
              },
              "modes": modes_payload,
              "shards": shards_payload,
              "categories": categories_payload,
              "editions": editions_payload,
              "missing": list(missing),
              "regressions": list(regressions),
          }

          with open("test262-summary.json", "w") as f:
              json.dump(summary_payload, f, indent=2, sort_keys=True)
              f.write("\n")

          # Verdict
          failed = False
          if missing:
              print(f"::error title=Test262 results incomplete::missing shard results for: {', '.join(missing)}")
              failed = True
          if regressions:
              for r in regressions:
                  print(f"::error title=Test262 regression::{r}")
              failed = True
          elif not missing:
              print(f"\nAll baselines met.")

          if failed:
              sys.exit(1)
          PYEOF

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test262-combined-report
          path: |
            test262-summary.md
            test262-summary.json
            test262-editions.md
            test262-editions.json
            test262-non-strict-results.json
            test262-strict-results.json
            test262-known-failures.json
          if-no-files-found: warn
          retention-days: 90

      - name: Report newly-failed tests
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, tempfile

          current_path = "test262-known-failures.json"
          if not os.path.exists(current_path):
              print("Skipping diff: no known-failures from current run (incomplete or error).")
              sys.exit(0)
          with open(current_path) as f:
              current_failures = {(r["path"], r["mode"]) for r in json.load(f)}

          repo = os.environ["GITHUB_REPOSITORY"]
          current_run_id = os.environ["CURRENT_RUN_ID"]

          # Find the most recent successful regression-check run on main (excluding current)
          out = subprocess.run(
              ["gh", "api", "--method", "GET",
               f"repos/{repo}/actions/workflows/test262.yml/runs",
               "-f", "branch=main", "-f", "status=success", "-f", "per_page=5",
               "--jq",
               f"[.workflow_runs[] | select(.id | tostring != \"{current_run_id}\")][0].id"],
              capture_output=True, text=True, timeout=30,
          )
          if out.returncode != 0:
              print(f"gh api lookup failed (skipping diff): {out.stderr.strip()[:200]}")
              sys.exit(0)
          prior_run_id = out.stdout.strip()
          if not prior_run_id or prior_run_id == "null":
              print("No prior successful main run found; skipping diff.")
              sys.exit(0)

          # Download the combined-report artifact from that run
          with tempfile.TemporaryDirectory() as tmpdir:
              dl = subprocess.run(
                  ["gh", "run", "download", prior_run_id,
                   "-n", "test262-combined-report", "-D", tmpdir],
                  capture_output=True, text=True, timeout=120,
              )
              if dl.returncode != 0:
                  print(f"Could not download prior artifact (run {prior_run_id}, skipping diff): {dl.stderr.strip()[:200]}")
                  sys.exit(0)
              prior_path = os.path.join(tmpdir, "test262-known-failures.json")
              if not os.path.exists(prior_path):
                  print(f"Prior run {prior_run_id} artifact has no known-failures; skipping diff.")
                  sys.exit(0)
              with open(prior_path) as f:
                  prior_failures = {(r["path"], r["mode"]) for r in json.load(f)}

          newly_failed = sorted(current_failures - prior_failures)
          recovered = sorted(prior_failures - current_failures)

          if not newly_failed and not recovered:
              print(f"No change in failing tests vs prior main run {prior_run_id}.")
          else:
              print(f"Diff vs prior main run {prior_run_id}:")
              if newly_failed:
                  print(f"\n  Newly failing ({len(newly_failed)}):")
                  for path, mode in newly_failed[:50]:
                      print(f"    [{mode}] {path}")
                  if len(newly_failed) > 50:
                      print(f"    ... and {len(newly_failed) - 50} more")
              if recovered:
                  print(f"\n  Recovered ({len(recovered)}):")
                  for path, mode in recovered[:20]:
                      print(f"    [{mode}] {path}")
                  if len(recovered) > 20:
                      print(f"    ... and {len(recovered) - 20} more")
          PYEOF
