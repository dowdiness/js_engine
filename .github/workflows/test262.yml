name: "Test262 Conformance"

on:
  push:
    branches: [main]
    paths-ignore:
      # Docs and markdown never affect the engine or the runner.
      - 'docs/**'
      - '*.md'
      # NOTE: scripts/** is intentionally NOT ignored because the authoritative
      # native MoonBit tooling reads shared data under scripts/ (e.g.
      # test262_skip_metadata.json), so changes there must re-trigger CI.
      - '.gitignore'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      # Skip on changes to OTHER workflow files (actionlint.yml, bench.yml,
      # copilot-setup-steps.yml). The negation re-includes this workflow's
      # own file so editing test262.yml still re-runs it. Order matters:
      # the ignore must precede the negation.
      - '.github/workflows/**'
      - '!.github/workflows/test262.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'
      - '!.github/workflows/test262.yml'
  workflow_dispatch:

# Auto-cancel superseded PR runs (you only care about the latest commit's
# verification on a PR), but never cancel in-progress runs on main — each
# merge must verify its own commit independently. The expression evaluates
# per-event, so the same group key serves both push-to-main and PR-update.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TEST262_COMMIT: "2b2ecead6e82"
  # Bump this string to force a toolchain cache bust (e.g. after a MoonBit release).
  MOONBIT_CACHE_VERSION: "2026-06"
  SHARD_TOTAL: 4

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache MoonBit toolchain
        id: toolchain-cache
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-toolchain-${{ runner.os }}-${{ env.MOONBIT_CACHE_VERSION }}

      - name: Install MoonBit toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Architecture state audit
        run: make architecture-state-audit

      - name: Test262 metadata parity
        run: make test262-metadata-test

      - name: Test262 utils parity
        run: make test262-utils-test

      - name: Check and test
        run: |
          moon check
          moon test

  unit-test-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-unit-runner-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-unit-runner-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Cache test262 suite (read-only)
        # Read-only restore: unit-test-runner is not the authoritative writer for
        # the test262 suite cache — the test262 matrix jobs own that. Using
        # cache/restore avoids concurrent-write races on the shared key.
        uses: actions/cache/restore@v5
        with:
          path: test262
          key: test262-${{ env.TEST262_COMMIT }}

      - name: Test262 runner shadow unit parity
        # make test262-runner-test includes a test262-download guard that skips
        # if test262/test already exists (from the cache restore above).
        run: make test262-runner-test

  test262:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mode: [strict, non-strict]
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache MoonBit toolchain
        id: toolchain-cache
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-toolchain-${{ runner.os }}-${{ env.MOONBIT_CACHE_VERSION }}

      - name: Install MoonBit toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Get MoonBit version
        id: moonbit-version
        run: echo "version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.moon/registry
            .mooncakes
          key: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('moon.mod') }}
          restore-keys: moon-deps-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: ./_build
          key: build-test262-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-${{ hashFiles('**/*.mbt', 'moon.mod', '**/moon.pkg.json') }}
          restore-keys: build-test262-${{ runner.os }}-${{ steps.moonbit-version.outputs.version }}-

      - name: Install MoonBit dependencies
        run: moon update

      - name: Build JS engine
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: moon build --target js --release

      - name: Cache test262 suite
        uses: actions/cache@v5
        with:
          path: test262
          key: test262-${{ env.TEST262_COMMIT }}

      - name: Download Test262
        run: |
          if [ ! -d "test262/test" ]; then
            curl -fsSL -L "https://api.github.com/repos/tc39/test262/tarball/${{ env.TEST262_COMMIT }}" -o /tmp/test262.tar.gz
            mkdir -p test262
            tar -xzf /tmp/test262.tar.gz -C test262 --strip-components=1
          fi

      - name: Build native tools
        run: |
          moon build --target native cmd/test262_runner
          moon build --target native cmd/classify_by_edition

      - name: Run Test262 (${{ matrix.mode }}, shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }})
        # MoonBit cmd/test262_runner is authoritative (issue #255 promotion).
        # `shell: bash` enables `-eo pipefail`. We disable
        # errexit locally so a non-zero runner status doesn't skip the
        # per-edition table — it's the more useful signal in CI logs than the
        # runner's one-row summary. The runner's exit code is preserved at the
        # end via `exit $rc`, and `continue-on-error: true` lets the workflow
        # proceed to upload.
        shell: bash
        run: |
          set +e
          ./_build/native/debug/build/cmd/test262_runner/test262_runner.exe \
            --test262 ./test262 \
            --mode ${{ matrix.mode }} \
            --shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }} \
            --threads 4 \
            --timeout 5 \
            --output test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json \
            --summary
          rc=$?
          # Write per-shard header and pass rates to this job's step summary page.
          python3 << 'PYEOF'
          import json, os
          result_file = "test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json"
          sp = os.environ.get("GITHUB_STEP_SUMMARY")
          if sp and os.path.exists(result_file) and os.path.getsize(result_file) > 0:
              try:
                  s = json.load(open(result_file))["summary"]
                  p, fa = s["passed"], s["failed"]
                  ex = p + fa
                  disc = s["total"]
                  pe = f"{p/ex*100:.1f}%" if ex > 0 else "n/a"
                  pd = f"{p/disc*100:.1f}%" if disc > 0 else "n/a"
                  with open(sp, "a") as out:
                      out.write("## Test262 — ${{ matrix.mode }} mode, Shard ${{ matrix.shard }} of ${{ env.SHARD_TOTAL }}\n\n")
                      out.write(f"- **Passed / Executed:** {pe} ({p:,} / {ex:,})\n")
                      out.write(f"- **Passed / Discovered:** {pd} ({p:,} / {disc:,})\n\n")
                      out.write("---\n\n")
              except Exception:
                  pass
          PYEOF
          classify_rc=0
          # Use `-s` (non-empty) instead of `-f` so the classifier doesn't
          # traceback on a truncated/empty JSON if the runner crashed early.
          if [ -s "test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json" ]; then
            echo
            echo "──────── Per-edition breakdown (${{ matrix.mode }}, shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }}) ────────"
            ./_build/native/debug/build/cmd/classify_by_edition/classify_by_edition.exe --markdown \
              --test262-root ./test262 \
              "test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json" \
              | tee -a "$GITHUB_STEP_SUMMARY"
            # PIPESTATUS[0] = classifier (tee always succeeds with -a).
            classify_rc=${PIPESTATUS[0]}
            if [ "$classify_rc" -ne 0 ]; then
              echo "::warning::classify_by_edition exited $classify_rc — per-edition table may be incomplete" >&2
            fi
          fi
          # Runner failure dominates; otherwise propagate classifier failure
          # so a silently-broken report path fails this step (visible under
          # continue-on-error as a marked failure, not green-with-warning).
          if [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi
          exit "$classify_rc"
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results
          path: test262-${{ matrix.mode }}-shard-${{ matrix.shard }}of${{ env.SHARD_TOTAL }}-results.json
          if-no-files-found: warn
          retention-days: 90

  regression-check:
    needs: test262
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout baseline
        uses: actions/checkout@v5
        with:
          sparse-checkout: test262-baseline.json
          sparse-checkout-cone-mode: false

      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          pattern: test262-*-results
          merge-multiple: true

      - name: Check for regressions
        run: |
          python3 << 'PYEOF'
          import glob, json, os, re, sys

          SHARD_TOTAL = ${{ env.SHARD_TOTAL }}

          # Load baseline
          with open("test262-baseline.json") as f:
              baseline = json.load(f)

          total_passed = 0
          total_failed = 0
          total_skipped = 0
          total_timeouts = 0
          missing = []
          regressions = []
          rows = []        # (mode, p, fa, to, rate, mode_min, delta) — per mode
          shard_rows = []  # (mode, idx, total, passed, failed, timeouts, rate) — per shard

          for mode in ["non-strict", "strict"]:
              shard_files = sorted(glob.glob(f"test262-{mode}-shard-*of{SHARD_TOTAL}-results.json"))
              if not shard_files:
                  print(f"{mode}: MISSING (no shard result files found)")
                  missing.append(mode)
                  continue
              if len(shard_files) != SHARD_TOTAL:
                  print(f"{mode}: INCOMPLETE ({len(shard_files)}/{SHARD_TOTAL} shards found)")
                  missing.append(mode)
                  continue
              p, fa, sk, to = 0, 0, 0, 0
              for sf in shard_files:
                  with open(sf) as fh:
                      data = json.load(fh)
                  s = data["summary"]
                  s_pass = s["passed"]
                  s_fail = s["failed"]
                  s_skip = s.get("skipped", 0)
                  s_time = s.get("timeout", 0)
                  p += s_pass; fa += s_fail; sk += s_skip; to += s_time
                  s_ex = s_pass + s_fail
                  s_rate = s_pass / s_ex * 100 if s_ex > 0 else 0
                  sh_m = re.search(r"-shard-(\d+)of(\d+)-", sf)
                  shard_rows.append((
                      mode,
                      int(sh_m.group(1)) if sh_m else 0,
                      int(sh_m.group(2)) if sh_m else 0,
                      s_pass, s_fail, s_time, s_rate,
                  ))
              total_passed += p
              total_failed += fa
              total_skipped += sk
              total_timeouts += to
              executed = p + fa
              rate = (p / executed * 100) if executed > 0 else 0

              # Per-mode baseline check
              mode_min = baseline.get(mode, {}).get("passed_min", 0)
              delta = p - mode_min
              sign = "+" if delta >= 0 else ""
              status = "OK" if p >= mode_min else "REGRESSION"
              print(f"{mode:>12}: {rate:5.1f}%  ({p} passed, {fa} failed, {to} timeouts)  [{status}: {sign}{delta} vs {mode_min} min]")

              if p < mode_min:
                  regressions.append(f"{mode}: {p} passed < {mode_min} baseline ({mode_min - p} regressed)")
              rows.append((mode, p, fa, to, rate, mode_min, delta))

          # Combined
          combined_min = baseline.get("combined", {}).get("passed_min", 0)
          combined_exec = total_passed + total_failed
          combined_rate = (total_passed / combined_exec * 100) if combined_exec > 0 else 0
          combined_delta = total_passed - combined_min
          if combined_exec > 0:
              sign = "+" if combined_delta >= 0 else ""
              print()
              print(f"    combined: {combined_rate:5.1f}%  ({total_passed} passed, {total_failed} failed)  [{sign}{combined_delta} vs {combined_min} min]")

          if total_passed < combined_min:
              regressions.append(f"combined: {total_passed} passed < {combined_min} baseline")

          # Write step summary
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path and rows:
              badge = "🔴" if regressions else ("⚠️" if missing else "🟢")
              verdict = "REGRESSION" if regressions else ("INCOMPLETE" if missing else "All baselines met")
              with open(summary_path, "a") as f:
                  f.write(f"## Test262 Conformance {badge} {verdict}\n\n")
                  f.write("| Mode | Passed | Failed | Timeouts | P/E | Baseline | Delta |\n")
                  f.write("|---|---:|---:|---:|---:|---:|---:|\n")
                  for (m, p, fa, to, rate, mode_min, delta) in rows:
                      dsign = "+" if delta >= 0 else ""
                      f.write(f"| {m} | {p:,} | {fa:,} | {to:,} | **{rate:.1f}%** | {mode_min:,} | {dsign}{delta:,} |\n")
                  if combined_exec > 0:
                      csign = "+" if combined_delta >= 0 else ""
                      f.write(f"| **combined** | **{total_passed:,}** | **{total_failed:,}** | **{total_timeouts:,}** | **{combined_rate:.1f}%** | {combined_min:,} | {csign}{combined_delta:,} |\n")
                  if shard_rows:
                      f.write("\n### Per-shard breakdown\n\n")
                      f.write("| Mode | Shard | Passed | Failed | Timeouts | P/E |\n")
                      f.write("|---|---|---:|---:|---:|---:|\n")
                      for (m, sidx, stot, s_p, s_f, s_t, s_r) in shard_rows:
                          f.write(f"| {m} | {sidx}/{stot} | {s_p:,} | {s_f:,} | {s_t:,} | {s_r:.1f}% |\n")
                  if regressions:
                      f.write("\n### Regressions\n\n")
                      for r in regressions:
                          f.write(f"- {r}\n")

          # Verdict
          failed = False
          if missing:
              print(f"\nERROR: Missing results for: {', '.join(missing)}", file=sys.stderr)
              failed = True
          if regressions:
              for r in regressions:
                  print(f"\nREGRESSION: {r}", file=sys.stderr)
              failed = True
          elif not missing:
              print(f"\nAll baselines met.")

          if failed:
              sys.exit(1)
          PYEOF
